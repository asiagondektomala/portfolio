<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: transparent; }
.wrap {
  position: relative;
  width: 304px;
  height: 228px;
}
.px {
  position: absolute;
  width: 38px;
  height: 38px;
  opacity: 0;
  animation: blink linear infinite;
}
@keyframes blink {
  0%,100% { opacity: 0; }
  45%, 55% { opacity: 1; }
}
</style>
</head>
<body>
<div class="wrap" id="g"></div>
<script>
var COLS = 8, ROWS = 6, SQ = 38;
var CX = (COLS - 1) / 2;
var CY = (ROWS - 1) / 2;
var COLORS = [
  'rgba(116,245,161,1)',
  'rgba(116,245,161,0.7)',
  'rgba(116,245,161,0.4)'
];

var wrap = document.getElementById('g');
var frag = document.createDocumentFragment();

// Precompute cells sorted by distance from center
var cells = [];
for (var r = 0; r < ROWS; r++) {
  for (var c = 0; c < COLS; c++) {
    var dx = c - CX, dy = r - CY;
    var dist = Math.sqrt(dx*dx + dy*dy);
    cells.push({r:r, c:c, dist:dist});
  }
}

// Sort by distance — nearest to center first
cells.sort(function(a,b){ return a.dist - b.dist; });

var maxDist = cells[cells.length-1].dist;

cells.forEach(function(cell) {
  // Probability: high near center, drops off with distance
  var prob = Math.pow(1 - cell.dist / (maxDist + 0.5), 1.2);
  if (Math.random() > prob) return;

  var d = document.createElement('div');
  d.className = 'px';
  d.style.left = (cell.c * SQ) + 'px';
  d.style.top = (cell.r * SQ) + 'px';

  // Cells near center get brighter, more opaque color
  var colorIdx = cell.dist < 1.5 ? 0 : cell.dist < 2.5 ? 1 : 2;
  d.style.backgroundColor = COLORS[colorIdx];

  // Cluster timing: nearby cells animate together (similar period+delay)
  // Base duration varies slowly across the grid
  var baseDur = 2 + cell.dist * 0.4;
  var dur = (baseDur + Math.random() * 1.5).toFixed(2);
  // Delay clusters cells: cells near center share a tighter delay window
  var delayBase = cell.dist * 0.3;
  var delay = (delayBase + Math.random() * 2).toFixed(2);

  d.style.animationDuration = dur + 's';
  d.style.animationDelay = delay + 's';
  frag.appendChild(d);
});

wrap.appendChild(frag);
</script>
</body>
</html>
