<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: transparent; }
.wrap {
  position: relative;
  width: 304px;
  height: 228px;
}
.px {
  position: absolute;
  width: 38px;
  height: 38px;
  opacity: 0;
  animation: blink linear infinite;
}
@keyframes blink {
  0%,100% { opacity: 0; }
  50% { opacity: 1; }
}
</style>
</head>
<body>
<div class="wrap" id="g"></div>
<script>
var COLS = 8, ROWS = 6, SQ = 38;
var COLORS = ['rgba(116,245,161,1)','rgba(116,245,161,0.6)','rgba(116,245,161,0.2)'];
var wrap = document.getElementById('g');
var frag = document.createDocumentFragment();
for (var r = 0; r < ROWS; r++) {
  for (var c = 0; c < COLS; c++) {
    if (Math.random() > 0.3) continue;
    var d = document.createElement('div');
    d.className = 'px';
    d.style.left = (c * SQ) + 'px';
    d.style.top = (r * SQ) + 'px';
    d.style.backgroundColor = COLORS[Math.floor(Math.random() * COLORS.length)];
    d.style.animationDuration = (1.5 + Math.random() * 4).toFixed(2) + 's';
    d.style.animationDelay = (Math.random() * 6).toFixed(2) + 's';
    frag.appendChild(d);
  }
}
wrap.appendChild(frag);
</script>
</body>
</html>
